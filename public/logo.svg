<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Monei Full Logo: Icon + Text -->

  <!-- Icon: M as growth chart -->
  <g>
    <!-- Rounded square background -->
    <rect width="40" height="40" rx="10" y="4" fill="#B6A77A"/>

    <!-- M shape formed by upward chart lines -->
    <path
      d="M10 30 L16 18 L22 24 L28 12 L34 20"
      stroke="white"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Subtle dot at the peak -->
    <circle cx="28" cy="12" r="2" fill="white"/>
  </g>

  <!-- Text: Monei -->
  <text
    x="52"
    y="32"
    font-family="Inter, -apple-system, system-ui, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#1A1A2E"
    letter-spacing="-0.5"
  >Monei</text>
</svg>
