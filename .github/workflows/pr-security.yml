name: PR - Security

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.28.2'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/xss
            p/typescript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

      - name: Dependency audit
        id: audit
        run: |
          echo "## Dependency Audit" > audit-report.md
          echo "" >> audit-report.md
          if pnpm audit --audit-level critical 2>&1 | tee audit-output.txt; then
            echo "| Status | Result |" >> audit-report.md
            echo "|--------|--------|" >> audit-report.md
            echo "| Dependencies | No critical vulnerabilities found |" >> audit-report.md
            echo "audit_failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "| Severity | Package | Details |" >> audit-report.md
            echo "|----------|---------|---------|" >> audit-report.md
            grep -E "critical|high" audit-output.txt | head -20 | while read -r line; do
              echo "| $line |" >> audit-report.md
            done
            echo "" >> audit-report.md
            echo "> **Pipeline blocked.** Fix critical vulnerabilities before merging." >> audit-report.md
            echo "audit_failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment audit results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Security Report\n\n';

            try {
              body += fs.readFileSync('audit-report.md', 'utf8');
            } catch {
              body += 'Audit report not available.';
            }

            body += '\n\n---\n';
            body += '${{ steps.audit.outputs.audit_failed }}' === 'true'
              ? '### :x: BLOCKED — Critical vulnerabilities detected'
              : '### :white_check_mark: PASSED — No critical vulnerabilities';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('## Security Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if critical vulnerabilities found
        if: steps.audit.outputs.audit_failed == 'true'
        run: exit 1
