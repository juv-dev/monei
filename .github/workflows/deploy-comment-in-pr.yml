name: Deploy / Comment in PR

on:
  workflow_run:
    workflows: ["Deploy / deploy-app"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment-in-pr:
    name: Comment in PR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Find associated PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = prs.find(pr => pr.merged_at);
            if (merged) {
              core.setOutput('pr_number', merged.number);
              core.setOutput('has_pr', 'true');
            } else {
              core.setOutput('has_pr', 'false');
            }

      - name: Comment deployment status
        if: steps.find-pr.outputs.has_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.pr_number || 0 }};
            if (!prNumber) return;

            const body = `## Deployment Status\n\n| Stage | Status |\n|-------|--------|\n| Build | In progress... |\n| Deploy | Pending |\n\n> Triggered by merge to \`main\` at \`${context.sha.substring(0, 7)}\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
