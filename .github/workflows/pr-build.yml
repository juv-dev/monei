name: PR - Build

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: '10.28.2'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm build

      - name: Bundle size report
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function getFiles(dir, files = []) {
              for (const f of fs.readdirSync(dir)) {
                const full = path.join(dir, f);
                if (fs.statSync(full).isDirectory()) {
                  getFiles(full, files);
                } else {
                  files.push(full);
                }
              }
              return files;
            }

            const distDir = 'dist/assets';
            if (!fs.existsSync(distDir)) {
              console.log('No dist/assets found');
              return;
            }

            const files = getFiles(distDir);
            const fmt = (bytes) => bytes > 1024 ? `${(bytes / 1024).toFixed(1)} KB` : `${bytes} B`;

            let body = '## Bundle Size\n\n| File | Size |\n|------|------|\n';
            let totalSize = 0;

            const sorted = files
              .map(f => ({ name: path.relative('dist', f), size: fs.statSync(f).size }))
              .sort((a, b) => b.size - a.size);

            for (const f of sorted) {
              body += `| \`${f.name}\` | ${fmt(f.size)} |\n`;
              totalSize += f.size;
            }
            body += `| **Total** | **${fmt(totalSize)}** |\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('## Bundle Size'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
