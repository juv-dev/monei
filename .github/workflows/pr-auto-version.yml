name: PR / auto-version

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  auto-version:
    name: auto-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if last commit is version bump
        id: skip
        run: |
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -q "^chore: bump version"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Last commit is version bump, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.skip.outputs.skip == 'false'
        with:
          node-version: '20'

      - name: Configure git
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump from commits
        if: steps.skip.outputs.skip == 'false'
        id: bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          LAST_COMMIT=$(git log -1 --pretty=format:"%s" "$HEAD_SHA")
          echo "Last commit: $LAST_COMMIT"

          BUMP="patch"

          if echo "$LAST_COMMIT" | grep -qiE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$LAST_COMMIT" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Determined bump: $BUMP"

      - name: Bump version in package.json
        if: steps.skip.outputs.skip == 'false'
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Update CHANGELOG.md
        if: steps.skip.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          DATE=$(date +%Y-%m-%d)
          COMMITS=$(git log --pretty=format:"- %s (%h)" "$BASE_SHA".."$HEAD_SHA")

          FEATURES=$(echo "$COMMITS" | grep -iE "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- fix" || true)
          OTHERS=$(echo "$COMMITS" | grep -viE "^- (feat|fix)" || true)

          ENTRY="## $NEW_VERSION ($DATE)"$'\n'

          if [ -n "$FEATURES" ]; then
            ENTRY+=$'\n'"### Features"$'\n'"$FEATURES"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            ENTRY+=$'\n'"### Bug Fixes"$'\n'"$FIXES"$'\n'
          fi
          if [ -n "$OTHERS" ]; then
            ENTRY+=$'\n'"### Other"$'\n'"$OTHERS"$'\n'
          fi

          if [ -f CHANGELOG.md ]; then
            EXISTING=$(cat CHANGELOG.md)
            echo -e "# Changelog\n\n$ENTRY\n${EXISTING#*# Changelog}" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n$ENTRY" > CHANGELOG.md
          fi

      - name: Check for changes
        if: steps.skip.outputs.skip == 'false'
        id: changes
        run: |
          if git diff --quiet package.json CHANGELOG.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: steps.skip.outputs.skip == 'false' && steps.changes.outputs.has_changes == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
