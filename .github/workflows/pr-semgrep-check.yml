name: PR / semgrep-check

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  semgrep-check:
    name: semgrep-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep code quality scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/javascript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
